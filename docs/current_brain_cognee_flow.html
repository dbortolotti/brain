<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Current Brain Cognee Flow</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fffdfa;
      --ink: #1c2229;
      --muted: #59636d;
      --rule: #d8d2c7;
      --panel: #ffffff;
      --accent: #12645a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }
    main {
      max-width: 1160px;
      margin: 0 auto;
      padding: 24px 18px 56px;
    }
    header {
      border-bottom: 1px solid var(--rule);
      margin-bottom: 22px;
      padding-bottom: 16px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.45rem, 3vw, 2.15rem);
      line-height: 1.15;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: var(--muted);
      max-width: 78ch;
    }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 18px 0 26px;
    }
    nav a {
      color: var(--accent);
      border: 1px solid var(--rule);
      background: var(--panel);
      border-radius: 6px;
      padding: 7px 10px;
      text-decoration: none;
      font-size: 0.92rem;
    }
    section {
      margin: 0 0 34px;
      padding-top: 4px;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 1.16rem;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .diagram-scroll {
      overflow: auto;
      border: 1px solid var(--rule);
      border-radius: 8px;
      background: #fff;
      padding: 8px;
      -webkit-overflow-scrolling: touch;
    }
    .diagram-svg {
      display: block;
      max-width: none;
      width: 900px;
      height: auto;
    }
    .note {
      margin-top: 8px;
      font-size: 0.9rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Current Brain Cognee Flow</h1>
      <p>Implementation-derived flow diagrams for the current Brain code paths. Boxes are numbered for discussion.</p>
    </header>
    <nav aria-label="Diagram sections">
      <a href="#ingestion">Data Ingestion</a>
      <a href="#retrieval">Data Retrieval</a>
      <a href="#nightly">Nightly Operation</a>
      <a href="#cli">CLI</a>
    </nav>

    <section id="ingestion">
      <h2>Data Ingestion</h2>
      <div class="diagram-scroll">
        <img class="diagram-svg" src="assets/current-brain-cognee-flow/ingestion.svg?v=brain-lean-20260523" alt="Data ingestion flow diagram">
      </div>
    </section>

    <section id="retrieval">
      <h2>Data Retrieval</h2>
      <div class="diagram-scroll">
        <img class="diagram-svg" src="assets/current-brain-cognee-flow/retrieval.svg?v=brain-lean-20260523" alt="Data retrieval flow diagram">
      </div>
    </section>

    <section id="nightly">
      <h2>Nightly Operation</h2>
      <div class="diagram-scroll">
        <img class="diagram-svg" src="assets/current-brain-cognee-flow/nightly.svg?v=brain-lean-20260523" alt="Nightly operation flow diagram">
      </div>
    </section>

    <section id="cli">
      <h2>CLI</h2>
      <div class="diagram-scroll">
        <img class="diagram-svg" src="assets/current-brain-cognee-flow/cli.svg?v=brain-lean-20260523" alt="CLI flow diagram">
      </div>
    </section>
  </main>
</body>
</html>
