name: brain-prod

services:
  neo4j:
    image: neo4j:5-community
    container_name: brain-prod-neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:17474:7474"
      - "127.0.0.1:17687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${GRAPH_DATABASE_PASSWORD:-change-me}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "2G"
      NEO4J_server_memory_pagecache_size: "1G"
    volumes:
      - "${BRAIN_PROD_ROOT:-/Volumes/xpg_usb4/prod/brain}/shared/docker/neo4j/data:/data"
      - "${BRAIN_PROD_ROOT:-/Volumes/xpg_usb4/prod/brain}/shared/docker/neo4j/logs:/logs"
      - "${BRAIN_PROD_ROOT:-/Volumes/xpg_usb4/prod/brain}/shared/docker/neo4j/import:/var/lib/neo4j/import"
      - "${BRAIN_PROD_ROOT:-/Volumes/xpg_usb4/prod/brain}/shared/docker/neo4j/plugins:/plugins"
