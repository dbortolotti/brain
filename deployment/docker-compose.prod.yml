name: ${BRAIN_DOCKER_PROJECT:-brain-prod}

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ${BRAIN_POSTGRES_CONTAINER:-brain-prod-postgres}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DB_PORT:-15432}:5432"
    environment:
      POSTGRES_DB: "${DB_NAME:-cognee_db}"
      POSTGRES_USER: "${DB_USERNAME:-cognee}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-cognee}"
    volumes:
      - "${BRAIN_PROD_ROOT:-/Volumes/xpg_usb4/prod/brain}/shared/docker/postgres/data:/var/lib/postgresql/data"
      - "./postgres/initdb:/docker-entrypoint-initdb.d:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-cognee} -d ${DB_NAME:-cognee_db}"]
      interval: 5s
      timeout: 5s
      retries: 20

  neo4j:
    image: neo4j:5-community
    container_name: ${BRAIN_NEO4J_CONTAINER:-brain-prod-neo4j}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BRAIN_NEO4J_HTTP_PORT:-17474}:7474"
      - "127.0.0.1:${BRAIN_NEO4J_BOLT_PORT:-17687}:7687"
    environment:
      NEO4J_AUTH: "neo4j/${GRAPH_DATABASE_PASSWORD:-change-me}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "2G"
      NEO4J_server_memory_pagecache_size: "1G"
    volumes:
      - "${BRAIN_PROD_ROOT:-/Volumes/xpg_usb4/prod/brain}/shared/docker/neo4j/data:/data"
      - "${BRAIN_PROD_ROOT:-/Volumes/xpg_usb4/prod/brain}/shared/docker/neo4j/logs:/logs"
      - "${BRAIN_PROD_ROOT:-/Volumes/xpg_usb4/prod/brain}/shared/docker/neo4j/import:/var/lib/neo4j/import"
      - "${BRAIN_PROD_ROOT:-/Volumes/xpg_usb4/prod/brain}/shared/docker/neo4j/plugins:/plugins"
