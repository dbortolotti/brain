name: Validate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Validate repository
        run: |
          uv sync --all-extras
          make docs-check
          uv run ruff check src tests scripts
          uv run pytest
