name: Deploy Local Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: brain-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - brain-prod
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Validate repository
        run: |
          uv sync --all-extras
          uv run ruff check src tests scripts
          uv run pytest

      - name: Deploy to local LaunchAgents
        run: ./scripts/deploy-local-production.sh
