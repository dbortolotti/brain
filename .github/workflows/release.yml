name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Previously staged release version to promote, for example v2.1.0"
        required: true
        type: string
      force_config_override:
        description: "Bypass prod config conflict checks and establish a new baseline"
        required: false
        default: false
        type: boolean

concurrency:
  group: brain-release
  cancel-in-progress: false

jobs:
  promote:
    runs-on:
      - self-hosted
      - linux
      - X64
      - brain-prod
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve staging release
        id: staging
        run: |
          set -euo pipefail
          TAG="${{ inputs.version }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "version must look like v2.1.0 or v2.1.0-rc.1" >&2
            exit 2
          fi
          git fetch --tags origin
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "tag $TAG does not exist; stage it first (deploy-local-staging)" >&2
            exit 2
          fi
          STAGING_SHA="$(git rev-list -n 1 "$TAG")"
          git cat-file -e "$STAGING_SHA^{commit}"
          git checkout "$STAGING_SHA"
          echo "sha=$STAGING_SHA" >>"$GITHUB_OUTPUT"
          echo "tag=$TAG" >>"$GITHUB_OUTPUT"

      - name: Validate staged revision
        run: |
          uv sync --all-extras
          make docs-check
          uv run ruff check src tests scripts
          uv run pytest

      - name: Render production config from GitHub Secrets
        id: render-config
        env:
          GITHUB_SHA: ${{ steps.staging.outputs.sha }}
          BRAIN_DEPLOY_ENV: prod
          BRAIN_RELEASE_ENV: prod
          BRAIN_RELEASE_SHA: ${{ steps.staging.outputs.sha }}
          BRAIN_RELEASE_VERSION: ${{ steps.staging.outputs.tag }}
          PROFILE: ${{ vars.PROFILE }}
          BRAIN_LLM_ENABLED: ${{ vars.BRAIN_LLM_ENABLED }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_TEMPERATURE: ${{ vars.LLM_TEMPERATURE }}
          LLM_MAX_TOKENS: ${{ vars.LLM_MAX_TOKENS }}
          OPENAI_AUTH_MODE: ${{ vars.OPENAI_AUTH_MODE }}
          OPENAI_CODEX_AUTH_PROFILE: ${{ vars.OPENAI_CODEX_AUTH_PROFILE }}
          OPENAI_CODEX_BASE_URL: ${{ vars.OPENAI_CODEX_BASE_URL }}
          BRAIN_PROVIDER_AUTH_PROFILES_PATH: ${{ vars.BRAIN_PROVIDER_AUTH_PROFILES_PATH }}
          BRAIN_PROVIDER_AUTH_STATE_DIR: ${{ vars.BRAIN_PROVIDER_AUTH_STATE_DIR }}
          EMBEDDING_PROVIDER: ${{ vars.EMBEDDING_PROVIDER }}
          EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL }}
          EMBEDDING_DIMENSIONS: ${{ vars.EMBEDDING_DIMENSIONS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
          AWS_PROFILE: ${{ vars.AWS_PROFILE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          GOOGLE_FREE_TIER: ${{ vars.GOOGLE_FREE_TIER }}
          GRAPH_DATABASE_PASSWORD: ${{ secrets.GRAPH_DATABASE_PASSWORD }}
          BRAIN_AUTH_TOKEN: ${{ secrets.BRAIN_AUTH_TOKEN }}
          BRAIN_AUTH_PASSWORD: ${{ secrets.BRAIN_AUTH_PASSWORD }}
          BRAIN_PUBLIC_BASE_URL: ${{ vars.BRAIN_PUBLIC_BASE_URL }}
          BRAIN_MCP_PATH: /mcp
          BRAIN_ADMIN_MCP_PATH: /admin/mcp
          BRAIN_APP_MCP_PATH: /app/mcp
          BRAIN_PUBLIC_MCP_PATH: /mcp
          BRAIN_PUBLIC_ADMIN_MCP_PATH: /admin/mcp
          BRAIN_PUBLIC_APP_MCP_PATH: /mcp
          BRAIN_OPENAI_APPS_CHALLENGE_TOKEN: ${{ vars.BRAIN_OPENAI_APPS_CHALLENGE_TOKEN }}
          BRAIN_PUBLIC_UI_PATH: /cognee
          BRAIN_PUBLIC_UI_API_PATH: /cognee-api
          BRAIN_GOOGLE_DRIVE_BACKUP_ENABLED: ${{ vars.BRAIN_GOOGLE_DRIVE_BACKUP_ENABLED }}
          BRAIN_GOOGLE_DRIVE_FOLDER: ${{ vars.BRAIN_GOOGLE_DRIVE_FOLDER }}
          BRAIN_GOOGLE_DRIVE_LOCAL_PATH: ${{ vars.BRAIN_GOOGLE_DRIVE_LOCAL_PATH }}
          BRAIN_NEO4J_DUMP_ENABLED: ${{ vars.BRAIN_NEO4J_DUMP_ENABLED }}
          BRAIN_NEO4J_STOP_FOR_DUMP: ${{ vars.BRAIN_NEO4J_STOP_FOR_DUMP }}
          BRAIN_REQUEST_LOG_ENABLED: ${{ vars.BRAIN_REQUEST_LOG_ENABLED }}
          BRAIN_REQUEST_LOG_MAX_BODY_BYTES: ${{ vars.BRAIN_REQUEST_LOG_MAX_BODY_BYTES }}
          BRAIN_TASTE_ENABLED: ${{ vars.BRAIN_TASTE_ENABLED }}
          BRAIN_TASTE_LLM_ROUTING_ENABLED: ${{ vars.BRAIN_TASTE_LLM_ROUTING_ENABLED }}
          BRAIN_TASTE_AUTO_ENRICH_ENABLED: ${{ vars.BRAIN_TASTE_AUTO_ENRICH_ENABLED }}
          BRAIN_TASTE_OMDB_API_KEY: ${{ secrets.BRAIN_TASTE_OMDB_API_KEY }}
          BRAIN_TASTE_WEB_ENRICHMENT_ENABLED: ${{ vars.BRAIN_TASTE_WEB_ENRICHMENT_ENABLED }}
          BRAIN_TASTE_GOOGLE_PLACES_API_KEY: ${{ secrets.BRAIN_TASTE_GOOGLE_PLACES_API_KEY }}
          BRAIN_TASTE_AUTO_WRITE_THRESHOLD: ${{ vars.BRAIN_TASTE_AUTO_WRITE_THRESHOLD }}
          BRAIN_TASTE_CONFIRMATION_THRESHOLD: ${{ vars.BRAIN_TASTE_CONFIRMATION_THRESHOLD }}
          BRAIN_TASTE_OPEN_LOOP_CLOSE_THRESHOLD: ${{ vars.BRAIN_TASTE_OPEN_LOOP_CLOSE_THRESHOLD }}
          BRAIN_TASTE_OPEN_LOOP_CONFIRMATION_THRESHOLD: ${{ vars.BRAIN_TASTE_OPEN_LOOP_CONFIRMATION_THRESHOLD }}
          BRAIN_TASTE_PROPOSAL_EXPIRY_HOURS: ${{ vars.BRAIN_TASTE_PROPOSAL_EXPIRY_HOURS }}
          BRAIN_UI_ENABLED: ${{ vars.BRAIN_UI_ENABLED }}
          BRAIN_SLACK_AGENT_ENABLED: ${{ vars.BRAIN_SLACK_AGENT_ENABLED }}
          BRAIN_SLACK_SIGNING_SECRET: ${{ secrets.BRAIN_SLACK_SIGNING_SECRET }}
          BRAIN_SLACK_BOT_TOKEN: ${{ secrets.BRAIN_SLACK_BOT_TOKEN }}
          BRAIN_SLACK_ALLOWED_TEAM_IDS: ${{ vars.BRAIN_SLACK_ALLOWED_TEAM_IDS }}
          BRAIN_SLACK_ALLOWED_CHANNEL_IDS: ${{ vars.BRAIN_SLACK_ALLOWED_CHANNEL_IDS }}
          BRAIN_SLACK_ALLOWED_USER_IDS: ${{ vars.BRAIN_SLACK_ALLOWED_USER_IDS }}
          BRAIN_SLACK_ADMIN_USER_IDS: ${{ vars.BRAIN_SLACK_ADMIN_USER_IDS }}
        run: |
          render_dir="$RUNNER_TEMP/brain-prod-config"
          mkdir -p "$render_dir"
          for name in brain.env brain.env.last-deployed brain-auth-password brain-auth-password.last-deployed; do
            if sudo -n test -f "/etc/brain/$name" 2>/dev/null; then
              sudo -n cat "/etc/brain/$name" >"$render_dir/$name" || rm -f "$render_dir/$name"
            fi
          done
          args=()
          args+=(--output "$render_dir/brain.env")
          args+=(--base-output "$render_dir/brain.env.last-deployed")
          args+=(--auth-password-file "$render_dir/brain-auth-password")
          args+=(--auth-password-base-file "$render_dir/brain-auth-password.last-deployed")
          if [[ "${{ inputs.force_config_override }}" == "true" ]]; then
            args+=(--force-config-override)
          fi
          uv run python scripts/render_prod_env.py --env prod "${args[@]}"
          echo "env_file=$render_dir/brain.env" >>"$GITHUB_OUTPUT"
          echo "auth_password_file=$render_dir/brain-auth-password" >>"$GITHUB_OUTPUT"

      - name: Promote staging revision to production
        run: |
          set -euo pipefail
          LOCAL_TAR="$(mktemp /tmp/brain-src.XXXXXX.tar.gz)"
          cleanup() { rm -f "$LOCAL_TAR"; }
          trap cleanup EXIT
          tar -czf "$LOCAL_TAR" \
            --exclude '.git' \
            --exclude '.env' \
            --exclude '.data' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '.pytest_cache' \
            --exclude '.ruff_cache' \
            -C "$(dirname "$PWD")" "$(basename "$PWD")"
          sudo env \
            GITHUB_SHA="${{ steps.staging.outputs.sha }}" \
            BRAIN_RELEASE_SHA="${{ steps.staging.outputs.sha }}" \
            BRAIN_RELEASE_VERSION="${{ steps.staging.outputs.tag }}" \
            BRAIN_DEPLOY_ENV=prod \
            "$PWD/scripts/install-cloud-linux-production.sh" \
            --source-tar "$LOCAL_TAR" \
            --rendered-env "${{ steps.render-config.outputs.env_file }}" \
            --rendered-auth-password "${{ steps.render-config.outputs.auth_password_file }}"

      - name: Verify promoted release tag
        run: |
          set -euo pipefail
          TAG_SHA="$(git rev-list -n 1 "${{ steps.staging.outputs.tag }}")"
          if [[ "$TAG_SHA" != "${{ steps.staging.outputs.sha }}" ]]; then
            echo "tag moved during release: $TAG_SHA" >&2
            exit 2
          fi
