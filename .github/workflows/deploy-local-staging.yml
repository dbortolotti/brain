name: Deploy Local Staging

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Staged release version, for example v2.1.0-rc.1"
        required: true
        type: string

concurrency:
  group: brain-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - X64
      - brain-prod
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve staging version
        id: version
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "version must look like v2.1.0 or v2.1.0-rc.1" >&2
            exit 2
          fi
          echo "version=$VERSION" >>"$GITHUB_OUTPUT"

      - name: Stamp docs with staged version
        id: docs
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          make docs-generate
          python3 - <<'PY'
          import json
          import os
          from datetime import UTC, datetime
          from pathlib import Path

          payload = {
              "environment": "staging",
              "version": os.environ["VERSION"],
              "stamped_at": datetime.now(UTC).isoformat(timespec="seconds"),
          }
          path = Path("docs/generated/release.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          git add docs/generated/facts.json docs/generated/facts.sha256 docs/generated/release.json
          if ! git diff --cached --quiet; then
            git commit -m "Stamp docs for $VERSION"
            git push origin HEAD:main
          fi
          STAGING_SHA="$(git rev-parse HEAD)"
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            TAG_SHA="$(git rev-list -n 1 "$VERSION")"
            if [[ "$TAG_SHA" != "$STAGING_SHA" ]]; then
              echo "tag $VERSION already points at $TAG_SHA, not $STAGING_SHA" >&2
              exit 2
            fi
          fi
          echo "sha=$STAGING_SHA" >>"$GITHUB_OUTPUT"

      - name: Validate repository
        run: |
          uv sync --all-extras
          make docs-check
          uv run ruff check src tests scripts
          uv run pytest

      - name: Tag staged release
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            echo "staged tag already exists at $(git rev-list -n 1 "$VERSION")"
            exit 0
          fi
          git tag -a "$VERSION" "${{ steps.docs.outputs.sha }}" -m "Stage $VERSION"
          git push origin "$VERSION"
