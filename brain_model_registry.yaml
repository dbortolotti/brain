# brain_model_registry.yaml
#
# Purpose:
#   Canonical model list for Brain model-eval tests.
#
# Design rule:
#   Do not hardcode provider models in test logic.
#   Load this registry and run fixtures by role/model/provider.
#
# Notes:
#   - Prices are indicative USD per 1M tokens where known.
#   - Keep provider IDs separate from logical aliases.
#   - Use "enabled_by_default: true" only for the core eval matrix.
#   - Use "judge_only: true" for expensive adjudication models.
#   - Use "skip_reason" for model families intentionally excluded.

version: 1

selection_policy:
  objective: "Find the cheapest model that saturates Brain memory quality."
  zero_tolerance_failures:
    - silent_high_confidence_overwrite
    - entity_overmerge
    - unresolved_pronoun_committed
    - long_source_as_single_memory_card
    - large_table_atomized_by_default
    - malformed_json_unrepairable
    - deleted_or_superseded_memory_returned_as_current
  choose_model_rule: >
    For each role, choose the cheapest model with zero zero-tolerance failures
    and no statistically meaningful quality gap versus the next stronger model.

fine_grained_deployment_decisions:
  source: "targeted_fine_grained eval_20260508_065310"
  note: >
    These are current eval-derived deployment decisions, not the full test matrix.
    Roles marked do_not_use_yet remain in the eval matrix for follow-up testing
    but should not be promoted into production defaults from the current report.

  use:
    intent_router:
      model: openai:gpt-5-nano
      reason: "Eligible under low-risk router gate; zero zero-tolerance failures."
    entity_mention_extractor:
      model: openai:gpt-5.4-mini
      reason: "Eligible with zero zero-tolerance failures; use only for mention extraction, not final resolution."
    debug_explainer:
      model: google:gemini-2.5-flash-lite
      reason: "Eligible in targeted fine-grained run eval_20260508_065310; best semantic score among eligible debug candidates."
    eval_judge:
      model: openai:gpt-5.5
      reason: "Eligible in targeted fine-grained run eval_20260508_065310; use for offline eval judging, not routine runtime."

  likely_after_more_samples:
    eval_judge_benchmark:
      model: openai:gpt-5.5-high
      reason: "Eligible in targeted fine-grained run but retained as benchmark-only due cost/latency policy."

  do_not_use_yet:
    conflict_candidate_detector:
      reason: "Current report shows material safety failure rate."
    conflict_explainer:
      reason: "Current report shows material safety failure rate; repair options should be backend-bound first."
    recall_synthesizer:
      reason: "Current report shows grounding/zero-tolerance failures."
    atomic_card_extractor:
      reason: "Current report shows low quality and safety failures; test stronger candidates first."
    source_classifier:
      reason: "Current scorer/report shows high semantic score but source/table safety failures; inspect before promotion."

fine_grained_capabilities:
  router:
    required: true
    required_model_roles:
      - intent_router
    deterministic_roles: []

  slack_intake:
    required: true
    required_model_roles:
      - source_classifier
      - durability_filter
      - memory_kind_classifier
      - repair_option_generator
      - commit_policy_decider
      - success_receipt_generator
    deterministic_roles:
      - zero_tolerance_validator

  memory_compiler:
    required: true
    required_model_roles:
      - atomic_card_extractor
      - entity_mention_extractor
      - relationship_extractor
      - open_loop_detector
      - table_policy_handler
      - source_takeaway_extractor
    deterministic_roles:
      - table_parser
      - source_loader
      - zero_tolerance_validator

  entity_resolution:
    required: true
    required_model_roles:
      - entity_mention_extractor
      - entity_candidate_ranker
      - entity_final_resolver
    deterministic_roles: []

  conflict_handling:
    required: true
    required_model_roles:
      - conflict_candidate_detector
      - conflict_explainer
      - conflict_policy_decider
    deterministic_roles: []

  recall:
    required: true
    required_model_roles:
      - recall_planner
      - recall_relevance_filter
      - recall_synthesizer
    deterministic_roles: []

  debug:
    required: false
    required_model_roles:
      - debug_explainer
    deterministic_roles: []

  judge:
    required: false
    required_model_roles:
      - eval_judge
    deterministic_roles: []

  embeddings:
    required: true
    optional_if_not_tested: true
    required_model_roles:
      - embeddings
    deterministic_roles: []

roles:
  router:
    description: "Intent classification for Slack/free-form messages."
    preferred_models:
      - openai:gpt-5-nano
      - google:gemini-2.5-flash-lite

  slack_intake:
    description: "Convert Slack messages into MemoryProposal and IngestionDecision."
    preferred_models:
      - openai:gpt-5.4-nano
      - google:gemini-2.5-flash-lite
      - google:gemini-2.5-flash
      - aws-bedrock:nvidia.nemotron-super-3-120b

  memory_compiler:
    description: "Extract atomic memory cards from notes, articles, summaries, transcripts."
    preferred_models:
      - openai:gpt-5.4-nano
      - google:gemini-2.5-flash-lite
      - google:gemini-2.5-flash
      - aws-bedrock:nvidia.nemotron-super-3-120b

  validator_critic:
    description: "Optional cheap LLM critic; deterministic validator remains authoritative."
    preferred_models:
      - openai:gpt-5-nano
      - google:gemini-2.5-flash-lite

  entity_resolution:
    description: "Resolve ambiguous entity mentions; prefer asking over unsafe merge."
    preferred_models:
      - openai:gpt-5.4-nano
      - openai:gpt-5.4-mini
      - google:gemini-2.5-flash
      - anthropic:claude-haiku-4-5

  conflict_classifier:
    description: "Classify duplicate/additive/supersedes/contradicts/correction."
    preferred_models:
      - openai:gpt-5.4-mini
      - google:gemini-2.5-flash
      - anthropic:claude-haiku-4-5
      - anthropic:claude-sonnet-4-6
      - aws-bedrock:nvidia.nemotron-super-3-120b

  recall_synthesizer:
    description: "Synthesize DB/Cognee retrieved records into grounded answers."
    preferred_models:
      - openai:gpt-5.4-nano
      - google:gemini-2.5-flash-lite
      - google:gemini-2.5-flash

  debug_explainer:
    description: "Explain recall plans, filtered candidates, sync/debug state."
    preferred_models:
      - openai:gpt-5.4-mini
      - google:gemini-2.5-flash

  eval_judge:
    description: "Offline judge for model output quality. Not normal runtime."
    preferred_models:
      - openai:gpt-5.5-xhigh
      - openai:gpt-5.4
      - anthropic:claude-sonnet-4-6
      - anthropic:claude-opus-4-7
    judge_only: true

  embeddings:
    description: "Embedding models for retrieval tests."
    preferred_models:
      - fastembed:intfloat/multilingual-e5-large
      - openai:text-embedding-3-small
      - openai:text-embedding-3-large
      - google:gemini-embedding-001
      - google:gemini-embedding-2
      - voyage:voyage-4-lite
      - voyage:voyage-4
      - voyage:voyage-4-large


